<section class="page-stack" *ngIf="vet()">
  <div class="page-hero compact">
    <div>
      <span class="eyebrow">Availability</span>
      <h1>Set clinic rhythm and working hours.</h1>
      <p>
        These values power the customer booking flow and determine the time
        slots generated for your profile.
      </p>
    </div>
  </div>

  <article class="section-card narrow">
    <form class="app-form" [formGroup]="form" (ngSubmit)="saveAvailability()">
      <label class="field">
        <span>Available days</span>
        <input type="text" formControlName="availableDays" placeholder="Mon-Fri, alternate Saturdays..." />
      </label>
      <label class="field">
        <span>Available time</span>
        <input type="text" formControlName="availableTime" placeholder="9 AM - 5 PM" />
      </label>
      <label class="field">
        <span>Clinic address</span>
        <textarea formControlName="clinicAddress" rows="4"></textarea>
      </label>

      <p class="form-message success" *ngIf="statusMessage()">{{ statusMessage() }}</p>
      <p class="form-message error" *ngIf="errorMessage()">{{ errorMessage() }}</p>

      <button class="primary-button block" type="submit">
        {{ saving() ? 'Saving...' : 'Save availability' }}
      </button>
    </form>
  </article>
</section>
